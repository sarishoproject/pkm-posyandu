name: Compile, Test, and Release

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*" # Trigger release saat tag v* di-push (oleh script bun run commit)
  pull_request:
    branches: ["main", "master"]

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Build untuk Testing di CI (Linux x64)
  # ═══════════════════════════════════════════════════════════
  test-build:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Compile binary untuk testing (Linux x64)
        run: bun run compile -- --target=bun-linux-x64

      - name: 🚀 Run and test binary
        run: |
          chmod +x ./build/app-bun-linux-x64
          
          export PORT=8080
          export NODE_ENV=production
          export DB_PATH=test-posyandu.db
          
          echo "Menjalankan binary di background..."
          ./build/app-bun-linux-x64 > server.log 2>&1 &
          PID=$!
          
          sleep 5
          
          if kill -0 $PID 2>/dev/null; then
            echo "✅ Server berhasil berjalan tanpa error (PID: $PID)."
            cat server.log
            kill $PID
            echo "🛑 Server telah dihentikan. Test sukses!"
            exit 0
          else
            echo "❌ Server gagal berjalan (crash saat startup)."
            cat server.log
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Build Target Asli & Release ke GitHub
  # ═══════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v') # Hanya jalan kalau ada tag v* di-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🍓 Compile untuk Linux ARM64 (Raspberry Pi)
        run: bun run compile -- --target=bun-linux-arm64

      - name: 📦 Arsipkan Linux ARM64
        run: |
          cd build
          tar -czf ../pkm-posyandu-${{ github.ref_name }}-linux-arm64.tar.gz .
          cd ..

      - name: 🪟 Compile untuk Windows x64
        run: bun run compile -- --target=bun-windows-x64

      - name: 📦 Arsipkan Windows x64
        run: |
          mv build build-windows
          zip -r pkm-posyandu-${{ github.ref_name }}-windows-x64.zip build-windows

      - name: 🚀 Buat GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            pkm-posyandu-${{ github.ref_name }}-linux-arm64.tar.gz
            pkm-posyandu-${{ github.ref_name }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}